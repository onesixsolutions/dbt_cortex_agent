name: dbt_cortex_agent_integration_tests
version: "1.0.0"
config-version: 2

profile: integration_tests

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_cortex_agent_integration_tests:
    +schema: INTEGRATION_TESTS

# Override these vars to point at real Snowflake objects in your test environment.
# Passed via: dbt run --vars '{"test_semantic_view": "DB.SCHEMA.MY_VIEW"}'
vars:
  test_semantic_view: "DB.SCHEMA.SEMANTIC_VIEW"
  test_cortex_search_service: "DB.SCHEMA.SEARCH_SERVICE"
